<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mapa de Sismos Perú 1960-2023</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/themes/base/jquery-ui.min.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <style>
            .map-legend {
                background: rgba(255, 255, 255, 0.95);
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid rgba(0, 0, 0, 0.12);
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
                font: 12px/1.2 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
                color: #1f2937;
            }
            .map-legend .legend-title {
                font-weight: 700;
                margin-bottom: 8px;
            }
            .map-legend .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
                white-space: nowrap;
            }
            .map-legend .legend-swatch {
                width: 12px;
                height: 12px;
                border-radius: 999px;
                border: 1px solid rgba(0, 0, 0, 0.25);
                flex: 0 0 auto;
            }
            .map-dept-geo-loading {
                position: absolute;
                inset: 0;
                z-index: 1100;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.78);
                font: 15px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-weight: 600;
                color: #1e3a8a;
                text-align: center;
                pointer-events: auto;
                border-radius: 2px;
            }
        </style>
    </head>
    <body>
        <div class="container py-4">
            <h2 class="mb-4">Mapa de Sismos Perú 1960-2023</h2>
            <div class="container-fluid">
                <div class="row">
                    <!-- Panel de filtros -->
                    <div class="col-md-3 p-3 bg-light">

                        <h5>Filtros</h5>

                        <!-- Slider rango de años (dos controles) -->
                        <div class="mb-3">
                            <label class="form-label">Años: <strong id="yearLabel">1960 – 2023</strong></label>
                            <div id="yearSlider" class="mt-2"></div>
                        </div>

                        <hr>

                        <!-- Rango manual -->
                        <div class="mb-2">
                            <label>Inicio</label>
                            <input type="date" id="fechaDesde" class="form-control" min="1960-01-01" max="2023-12-31" >
                        </div>

                        <div class="mb-2">
                            <label>Fin</label>
                            <input type="date" id="fechaHasta" class="form-control" max="2023-12-31" disabled aria-disabled="true" >
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label class="form-label" for="filtroDepartamento">Departamento</label>
                            <select id="filtroDepartamento" class="form-select">
                                <option value="">Cargando…</option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100 mt-2" id="btnFiltrar">Filtrar</button>

                    </div>

                    <!-- Mapa -->
                    <div class="col-md-9">
                        <strong id="info-resultados"></strong><br>
                        <strong>ℹ️ Haz click en los puntos para ver más detalle.</strong>

                        <div id="loading" style="display:none;">Cargando...</div>
                        <div class="position-relative">
                            <div id="mapDeptGeoLoading" class="map-dept-geo-loading" role="status" aria-live="polite">
                                Cargando límites departamentales..
                            </div>
                            <div id="map" style="height: 80vh;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/jquery-ui.min.js"></script>
        <script>

            const $fechaDesde = $('#fechaDesde');
            const $fechaHasta = $('#fechaHasta');
            const $filtroDepartamento = $('#filtroDepartamento');

            function cargarOpcionesDepartamento() {
                return fetch('/api/departamentos')
                    .then((res) => res.json())
                    .then((departamentos) => {
                        $filtroDepartamento.empty();
                        $filtroDepartamento.append(
                            $('<option></option>').val('').text('TODOS')
                        );
                        departamentos.forEach((dep) => {
                            $filtroDepartamento.append(
                                $('<option></option>').val(dep.id).text(dep.nombre)
                            );
                        });
                    });
            }

            cargarOpcionesDepartamento();

            $fechaDesde.on('change', () => {
                const desde = $fechaDesde.val();
                if (!desde) {
                    $fechaHasta.val('').removeAttr('min');
                    $fechaHasta.prop('disabled', true);
                    $fechaHasta.attr('aria-disabled', 'true');
                    return;
                }
                $fechaHasta.attr('min', desde);
                $fechaHasta.prop('disabled', false);
                $fechaHasta.attr('aria-disabled', 'false');
                const hasta = $fechaHasta.val();
                if (hasta && hasta < desde) {
                    $fechaHasta.val(desde);
                }
            });

            const map = L.map('map').setView([-12.0464, -77.0428], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 
                {attribution: '&copy; OpenStreetMap'}).addTo(map);

            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', "map-legend");
                div.innerHTML = `
                    <div class="legend-title">Magnitud</div>
                    <div class="legend-item">
                        <i class="legend-swatch" style="background:red"></i>Alta (≥ 6)
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch" style="background:orange"></span>Media (≥ 4.5)
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch" style="background:green"></span>Baja (≥ 0)
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);
                return div;
            }
            legend.addTo(map);

            const reglasMagnitud = [
                {min: 6, categoria: "alta", color:"red", radio:8, descripcion:"Alta (≥ 6)" },
                {min: 4.5, categoria: "media", color:"orange", radio:6, descripcion:"Media (≥ 4.5)" },
                {min: 0, categoria: "baja", color:"green", radio:4, descripcion:"Baja (≥ 0)" }
            ]
            function getInfoMagnitud(magnitud){
                return reglasMagnitud.find(r=> magnitud >= r.min) || {categoria:"ninguna", color:"gray"}
            }

            const capas = {};
            const overlays = {};
            
            reglasMagnitud.forEach(r => {capas[r.categoria] = L.layerGroup().addTo(map)}); //Es dinámico
            reglasMagnitud.forEach(r => {overlays["Magnitud " + r.categoria] = capas[r.categoria]});
            const layersControl = L.control.layers(null, overlays).addTo(map);

            function cargarCapaLimitesDepartamentos(mapInstance, capaControl) {
                return fetch('/api/departamentos_geo')
                    .then((res) => res.json())
                    .then((geojson) => {
                        const deptStyle = {
                            color: '#1e40af',
                            weight: 1,
                            opacity: 0.75,
                            fillColor: '#3b82f6',
                            fillOpacity: 0.06
                        };
                        const departamentosGeo = L.geoJSON(geojson, {
                            style: () => deptStyle,
                            onEachFeature: function (feature, lyr) {
                                const nombre = feature.properties && feature.properties.nombre;
                                if (nombre) lyr.bindPopup(nombre);
                            }
                        }).addTo(mapInstance);
                        capaControl.addOverlay(departamentosGeo, 'Departamentos');
                    })
                    .catch(() => {
                        console.error('No se pudo cargar /api/departamentos_geo');
                    })
                    .finally(() => {
                        $('#mapDeptGeoLoading').hide();
                    });
            }

            cargarCapaLimitesDepartamentos(map, layersControl);

            function obtenerSismosJson(inicio, fin) {
                const params = { inicio, fin };
                const dep = $('#filtroDepartamento option:selected').text();
                if (dep && dep !== 'TODOS') {
                    params.departamento = dep;
                }
                const qs = new URLSearchParams(params).toString();
                return fetch(`/api/sismos?${qs}`).then((res) => res.json());
            }

            function cargarSismosAlMapa(inicio, fin) {
                $('#yearSlider').slider('disable');
                $('#loading').show();
                return obtenerSismosJson(inicio, fin)
                    .then((data) => renderSismos(data))
                    .catch(() => alert('No se pudo cargar los sismos.'))
                    .finally(() => {
                        $('#loading').hide();
                        $('#yearSlider').slider('enable');
                    });
            }

            function renderSismos(data) {
                
                const sismos = data.data
                const limit = data.limit
                const total = data.total

                if(total >= limit){
                    $("#info-resultados").text(`⚠️ Mostrando ${limit} resultados de ${total}.`)
                }else{
                    if(total === 1){
                        $("#info-resultados").text(`⚠️ Mostrando el único resultado.`)
                    }else{
                        $("#info-resultados").text(`⚠️ Mostrando los ${total} resultados.`)
                    }
                }

                //markersLayer.clearLayers();
                capas.alta.clearLayers();
                capas.media.clearLayers();
                capas.baja.clearLayers();

                sismos.forEach(sismo => {
                    const info = getInfoMagnitud(sismo.magnitud);
                    L.circleMarker([sismo.lat, sismo.lon], { radius: info.radio, color: info.color })
                        .addTo(capas[info.categoria]) //.addTo(markersLayer)
                        .bindPopup(`Magnitud: ${sismo.magnitud}<br>
                                    Profundidad: ${sismo.profundidad}<br>
                                    Fecha: ${sismo.fecha}`);
                });
                
            }

            const datosIniciales = {{ initial_data | tojson }};
            renderSismos(datosIniciales);

            $('#btnFiltrar').on('click', () => {
                const inicio = $fechaDesde.val();
                const fin = $fechaHasta.val();
                if (!inicio || !fin) {
                    alert('Seleccione fecha desde y fecha hasta.');
                    return;
                }
                cargarSismosAlMapa(inicio, fin);
            });

            let yearSliderTimeout;

            function yearRangeFromSlider() {
                const v = $('#yearSlider').slider('option', 'values');
                return {
                    yMin: Math.min(v[0], v[1]),
                    yMax: Math.max(v[0], v[1])
                };
            }

            function updateYearLabel(yMin, yMax) {
                $('#yearLabel').text(yMin + ' – ' + yMax);
            }

            $('#yearSlider').slider({
                range: true,
                min: 1960,
                max: 2023,
                values: [1960, 2023],
                slide: function (event, ui) {
                    const yMin = ui.values[0];
                    const yMax = ui.values[1];
                    updateYearLabel(yMin, yMax);

                    clearTimeout(yearSliderTimeout);
                    yearSliderTimeout = setTimeout(() => {
                        const r = yearRangeFromSlider();
                        const inicio = `${r.yMin}-01-01`;
                        const fin = `${r.yMax}-12-31`;
                        cargarSismosAlMapa(inicio, fin);
                    }, 400);
                }
            });

            (function initYearLabel() {
                const r = yearRangeFromSlider();
                updateYearLabel(r.yMin, r.yMax);
            })();

            $filtroDepartamento.on('change', function () {
                const inicio = $fechaDesde.val();
                const fin = $fechaHasta.val();
                if (inicio && fin) {
                    cargarSismosAlMapa(inicio, fin);
                } else {
                    const r = yearRangeFromSlider();
                    cargarSismosAlMapa(`${r.yMin}-01-01`, `${r.yMax}-12-31`);
                }
            });

        </script>
    </body>
</html>
