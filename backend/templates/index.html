<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mapa de Sismos Perú 1960-2023</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/themes/base/jquery-ui.min.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
        <style>
            .map-legend {
                background: rgba(255, 255, 255, 0.95);
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid rgba(0, 0, 0, 0.12);
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
                font: 12px/1.2 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
                color: #1f2937;
            }
            .map-legend .legend-title {
                font-weight: 700;
                margin-bottom: 8px;
            }
            .map-legend .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
                white-space: nowrap;
            }
            .map-legend .legend-swatch {
                width: 12px;
                height: 12px;
                border-radius: 999px;
                border: 1px solid rgba(0, 0, 0, 0.25);
                flex: 0 0 auto;
            }
            .map-dept-geo-loading {
                position: absolute;
                inset: 0;
                z-index: 1100;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.78);
                font: 15px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-weight: 600;
                color: #1e3a8a;
                text-align: center;
                pointer-events: auto;
                border-radius: 2px;
            }
        </style>
    </head>
    <body>
        <div class="container py-4">
            <h2 class="mb-4">Mapa de Sismos Perú 1960-2023</h2>
            <div class="container-fluid">
                <div class="row">
                    <!-- Panel de filtros -->
                    <div class="col-md-3 p-3 bg-light">

                        <h5>Filtros</h5>

                        <div class="mb-3">
                            <label class="form-label" for="filtroDepartamento">Departamento</label>
                            <select id="filtroDepartamento" class="form-select">
                                <option value="">TODOS</option>
                            </select>
                        </div>

                        <hr>

                        <div id="panelFiltroAnios" class="mb-3">
                            <label class="form-label">Años: <strong id="yearLabel">1960 – 2023</strong></label>
                            <div id="yearSlider" class="mt-2"></div>
                        </div>

                        <div id="panelFiltroManual" class="mb-3" style="display: none;">
                            <div class="mb-2">
                                <label class="form-label" for="fechaDesde">Inicio</label>
                                <input type="date" id="fechaDesde" class="form-control" min="1960-01-01" max="2023-12-31" >
                            </div>
                            <div class="mb-2">
                                <label class="form-label" for="fechaHasta">Fin</label>
                                <input type="date" id="fechaHasta" class="form-control" max="2023-12-31" disabled aria-disabled="true" >
                            </div>
                            <button type="button" class="btn btn-primary w-100 mt-2" id="btnFiltrar">Filtrar</button>
                        </div>

                        <button type="button" class="btn btn-outline-secondary btn-sm w-100 mb-3" id="btnCambiarModoFecha"></button>

                    </div>

                    <!-- Mapa -->
                    <div class="col-md-9">
                        <strong id="info-resultados"></strong><br>
                        <strong>🗺️ Haz click en un departamento para filtrar.</strong>

                        <div id="loading" style="display:none;">Cargando...</div>
                        <div class="position-relative">
                            <div id="mapDeptGeoLoading" class="map-dept-geo-loading" role="status" aria-live="polite">
                                Cargando límites departamentales..
                            </div>
                            <div id="map" style="height: 80vh;"></div>
                        </div>
                        
                    </div>
                </div>
                <div>
                    <span style="font-size: 12px;opacity: 0.7;">
                        Desarrollado por Grecia Guerrero
                    </span>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/jquery-ui.min.js"></script>
        <script src="{{ url_for('static', filename='scripts.js') }}"></script>
    </body>
</html>
