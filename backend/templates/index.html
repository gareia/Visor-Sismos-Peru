<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mapa de Sismos Perú 1960-2023</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/themes/base/jquery-ui.min.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <style>
            .map-legend {
                background: rgba(255, 255, 255, 0.95);
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid rgba(0, 0, 0, 0.12);
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
                font: 12px/1.2 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
                color: #1f2937;
            }
            .map-legend .legend-title {
                font-weight: 700;
                margin-bottom: 8px;
            }
            .map-legend .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
                white-space: nowrap;
            }
            .map-legend .legend-swatch {
                width: 12px;
                height: 12px;
                border-radius: 999px;
                border: 1px solid rgba(0, 0, 0, 0.25);
                flex: 0 0 auto;
            }
        </style>
    </head>
    <body>
        <div class="container py-4">
            <h2 class="mb-4">Mapa de Sismos Perú 1960-2023</h2>
            <div class="container-fluid">
                <div class="row">
                    <!-- Panel de filtros -->
                    <div class="col-md-3 p-3 bg-light">

                        <h5>Filtros</h5>

                        <!-- Slider rango de años (dos controles) -->
                        <div class="mb-3">
                            <label class="form-label">Años: <strong id="yearLabel">1960 – 2023</strong></label>
                            <div id="yearSlider" class="mt-2"></div>
                        </div>

                        <hr>

                        <!-- Rango manual -->
                        <div class="mb-2">
                            <label>Inicio</label>
                            <input type="date" id="fechaDesde" class="form-control" min="1960-01-01" max="2023-12-31" >
                        </div>

                        <div class="mb-2">
                            <label>Fin</label>
                            <input type="date" id="fechaHasta" class="form-control" max="2023-12-31" disabled aria-disabled="true" >
                        </div>

                        <button class="btn btn-primary w-100 mt-2" id="btnFiltrar">Filtrar</button>

                    </div>

                    <!-- Mapa -->
                    <div class="col-md-9">
                        <strong>⚠️ Mostrando 500 resultados. Haz click en los puntos para ver detalle.</strong>

                        <div id="loading" style="display:none;">Cargando...</div>
                        <div id="map" style="height: 80vh;"></div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/dist/jquery-ui.min.js"></script>
        <script>

            const $fechaDesde = $('#fechaDesde');
            const $fechaHasta = $('#fechaHasta');

            $fechaDesde.on('change', () => {
                const desde = $fechaDesde.val();
                if (!desde) {
                    $fechaHasta.val('').removeAttr('min');
                    $fechaHasta.prop('disabled', true);
                    $fechaHasta.attr('aria-disabled', 'true');
                    return;
                }
                $fechaHasta.attr('min', desde);
                $fechaHasta.prop('disabled', false);
                $fechaHasta.attr('aria-disabled', 'false');
                const hasta = $fechaHasta.val();
                if (hasta && hasta < desde) {
                    $fechaHasta.val(desde);
                }
            });

            const map = L.map('map').setView([-12.0464, -77.0428], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', 
                {attribution: '&copy; OpenStreetMap'}).addTo(map);

            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', "map-legend");
                div.innerHTML = `
                    <div class="legend-title">Magnitud</div>
                    <div class="legend-item">
                        <i class="legend-swatch" style="background:red"></i>Alta
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch" style="background:orange"></span>Media
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch" style="background:green"></span>Baja
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);
                return div;
            }
            legend.addTo(map);

            const reglasMagnitud = [
                {min: 6, categoria: "alta", color:"red", radio:8 },
                {min: 4.5, categoria: "media", color:"orange", radio:6 },
                {min: 0, categoria: "baja", color:"green", radio:4 }
            ]
            function getInfoMagnitud(magnitud){
                return reglasMagnitud.find(r=> magnitud >= r.min) || {categoria:"ninguna", color:"gray"}
            }

            console.log(0||10);
            console.log(0??15);

            const capas = {};
            const overlays = {};
            reglasMagnitud.forEach(r => {capas[r.categoria] = L.layerGroup().addTo(map)}); //Es dinámico
            reglasMagnitud.forEach(r => {overlays["Magnitud " + r.categoria] = capas[r.categoria]});
            L.control.layers(null, overlays).addTo(map);
           
            function renderSismos(data) {
                //markersLayer.clearLayers();
                capas.alta.clearLayers();
                capas.media.clearLayers();
                capas.baja.clearLayers();

                data.forEach(sismo => {
                    const info = getInfoMagnitud(sismo.magnitud);
                    L.circleMarker([sismo.lat, sismo.lon], { radius: info.radio, color: info.color })
                        .addTo(capas[info.categoria]) //.addTo(markersLayer)
                        .bindPopup(`Magnitud: ${sismo.magnitud}<br>
                                    Profundidad: ${sismo.profundidad}<br>
                                    Fecha: ${sismo.fecha}`);
                });
                
            }

            const datosIniciales = {{ datos_sismos | tojson }};
            renderSismos(datosIniciales);

            $('#btnFiltrar').on('click', () => {
                const inicio = $fechaDesde.val();
                const fin = $fechaHasta.val();
                if (!inicio || !fin) {
                    alert('Seleccione fecha desde y fecha hasta.');
                    return;
                }
                const qs = new URLSearchParams({ inicio, fin }).toString();
                fetch(`/api/sismos?${qs}`)
                    .then(res => res.json())
                    .then(data => renderSismos(data))
                    .catch(() => alert('No se pudo cargar los sismos.'));
            });

            let yearSliderTimeout;

            function yearRangeFromSlider() {
                const v = $('#yearSlider').slider('option', 'values');
                return {
                    yMin: Math.min(v[0], v[1]),
                    yMax: Math.max(v[0], v[1])
                };
            }

            function updateYearLabel(yMin, yMax) {
                $('#yearLabel').text(yMin + ' – ' + yMax);
            }

            $('#yearSlider').slider({
                range: true,
                min: 1960,
                max: 2023,
                values: [1960, 2023],
                slide: function (event, ui) {
                    const yMin = ui.values[0];
                    const yMax = ui.values[1];
                    updateYearLabel(yMin, yMax);

                    clearTimeout(yearSliderTimeout);
                    yearSliderTimeout = setTimeout(() => {
                        const r = yearRangeFromSlider();
                        $('#yearSlider').slider('disable');
                        $('#loading').show();

                        fetch(`/api/sismos?inicio=${r.yMin}-01-01&fin=${r.yMax}-12-31`)
                            .then(res => res.json())
                            .then(data => renderSismos(data))
                            .catch(() => alert('No se pudo cargar los sismos.'))
                            .finally(() => {
                                $('#loading').hide();
                                $('#yearSlider').slider('enable');
                            });
                    }, 400);
                }
            });

            (function initYearLabel() {
                const r = yearRangeFromSlider();
                updateYearLabel(r.yMin, r.yMax);
            })();

        </script>
    </body>
</html>
