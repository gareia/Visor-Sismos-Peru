<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mapa de Sismos Perú 1960-2023</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    </head>
    <body>
        <div class="container py-4">
            <h2 class="mb-4">Mapa de Sismos Perú 1960-2023</h2>

            <div class="row g-3 mb-3 align-items-end">
                <div class="col-sm-6 col-md-4 col-lg-3">
                    <label for="fechaDesde" class="form-label">Fecha desde</label>
                    <input type="date" class="form-control" id="fechaDesde" name="fechaDesde" min="1960-01-01" max="2023-12-31" />
                </div>
                <div class="col-sm-6 col-md-4 col-lg-3">
                    <label for="fechaHasta" class="form-label">Fecha hasta</label>
                    <input type="date" class="form-control" id="fechaHasta" name="fechaHasta" max="2023-12-31" disabled aria-disabled="true" />
                </div>
                <div class="col-auto">
                    <button type="button" class="btn btn-success" id="btnBuscar">Buscar</button>
                </div>
            </div>

            <div id="map" style="height:600px;"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script>
            const $fechaDesde = $('#fechaDesde');
            const $fechaHasta = $('#fechaHasta');

            $fechaDesde.on('change', () => {
                const desde = $fechaDesde.val();
                if (!desde) {
                    $fechaHasta.val('').removeAttr('min');
                    $fechaHasta.prop('disabled', true);
                    $fechaHasta.attr('aria-disabled', 'true');
                    return;
                }
                $fechaHasta.attr('min', desde);
                $fechaHasta.prop('disabled', false);
                $fechaHasta.attr('aria-disabled', 'false');
                const hasta = $fechaHasta.val();
                if (hasta && hasta < desde) {
                    $fechaHasta.val(desde);
                }
            });

            const map = L.map('map').setView([-12.0464, -77.0428], 5);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
                }).addTo(map);

            const markersLayer = L.layerGroup().addTo(map);

            function renderSismos(data) {
                markersLayer.clearLayers();
                data.forEach(sismo => {
                    const color = sismo.magnitud >= 5 ? 'red' : 'orange';
                    L.circleMarker([sismo.lat, sismo.lon], { radius: 6, color: color })
                        .addTo(markersLayer)
                        .bindPopup(`Magnitud: ${sismo.magnitud}<br>
                                    Profundidad: ${sismo.profundidad}<br>
                                    Fecha: ${sismo.fecha}`);
                });
            }

            const datosIniciales = {{ datos_sismos | tojson }};
            renderSismos(datosIniciales);

            $('#btnBuscar').on('click', () => {
                const inicio = $fechaDesde.val();
                const fin = $fechaHasta.val();
                if (!inicio || !fin) {
                    alert('Seleccione fecha desde y fecha hasta.');
                    return;
                }
                const qs = new URLSearchParams({ inicio, fin }).toString();
                fetch(`/api/sismos?${qs}`)
                    .then(res => res.json())
                    .then(data => renderSismos(data))
                    .catch(() => alert('No se pudo cargar los sismos.'));
            });

        </script>
    </body>
</html>
