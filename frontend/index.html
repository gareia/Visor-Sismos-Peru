<!DOCTYPE html>
<html>
    <head>
        <title>Mapa de Sismos Perú 1960-2023</title>
        <meta charset="utf-8" />

        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    </head>
    <body>
        <h2>Mapa de Sismos Perú 1960-2023</h2>
        <div id="map" style="height:600px;"></div>

        <script>
            const map = L.map('map').setView([-12.0464, -77.0428], 5); 
           
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
                }).addTo(map);
            
                fetch('http://localhost:5000/sismos')
                .then(res => res.json())
                .then(data => {
                    data.forEach(sismo => {
                        let color = sismo.magnitud >=  5 ? 'red': 'orange';

                        L.circleMarker([sismo.lat, sismo.lon], {radius:6, color:color})
                        .addTo(map)
                        .bindPopup(`Magnitud: ${sismo.magnitud}<br>
                                    Profundidad: ${sismo.profundidad}<br>
                                    Fecha: ${sismo.fecha}`);
                    });
                })

        </script>
    </body>
</html>
